name: Build xAi APK 

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Verify Java
        run: java -version

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'
          accept-android-sdk-licenses: true

      # ------------------------------------------------------------
      # 1. Get GeckoView version (with reliable fallback)
      # ------------------------------------------------------------
      - name: Determine GeckoView version
        id: gecko
        run: | 
          echo "GECKO_VERSION=115.0.20230726201356" >> $GITHUB_ENV

      # ------------------------------------------------------------
      # 2. Create project directories
      # ------------------------------------------------------------
      - name: Create project directories
        run: |
          mkdir -p app/src/main/java/com/bdadtt/bappa
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/xml
          mkdir -p gradle/wrapper

      # ------------------------------------------------------------
      # 3. Gradle files (AGP 8.2.0, compileSdk 34)
      # ------------------------------------------------------------
      - name: Write settings.gradle
        run: |
          cat > settings.gradle << 'EOF'
          rootProject.name = "xAi"
          include ':app'
          EOF

      - name: Write root build.gradle
        run: |
          cat > build.gradle << 'EOF'
          buildscript {
            repositories {
              google()
              mavenCentral()
            }
            dependencies {
              classpath 'com.android.tools.build:gradle:8.2.0'
            }
          }
          allprojects {
            repositories {
              google()
              mavenCentral()
              maven {
                url "https://maven.mozilla.org/maven2/"
              }
            }
          }
          
          task clean(type: Delete) {
            delete rootProject.buildDir
          }
          EOF

      - name: Write gradle.properties
        run: |
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8
          org.gradle.parallel=true
          android.useAndroidX=true
          android.enableJetifier=true
          android.enableR8.fullMode=false
          EOF

      # ------------------------------------------------------------
      # 4. App build.gradle
      # ------------------------------------------------------------
      - name: Write app/build.gradle
        run: |
          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'

           android {

               namespace "com.bdadtt.bappa"
               compileSdk 34

             defaultConfig {
              applicationId "com.bdadtt.bappa"
              minSdkVersion 21
              targetSdkVersion 33
              versionCode 1
              versionName "1.0"
              multiDexEnabled true

              resConfigs "en"
              
              ndk {
                  abiFilters "armeabi-v7a"
             }
           }

          signingConfigs {
              release {
                storeFile file("xai_release.jks")
                storePassword "xai_store_pass"
                keyAlias "xai_key"
                keyPassword "xai_key_pass"
                v1SigningEnabled true
                v2SigningEnabled true
              }
            }
            buildTypes {
               release {
                   signingConfig signingConfigs.release
                   minifyEnabled true
                   shrinkResources true
                   proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
               }
            }
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_1_8
                targetCompatibility JavaVersion.VERSION_1_8
           }
            
            packagingOptions {
                jniLibs {
                    useLegacyPackaging true
                }
                
                resources {
                    excludes += '/META-INF/{AL2.0,LGPL2.1}'
                    excludes += '/META-INF/DEPENDENCIES'
                }
           }
           }
          dependencies {
               constraints {
                  implementation("org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22") {
                      because("Aligns JDK 7 extensions with the core stdlib to fix duplicate classes")
                  }
                  implementation("org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22") {
                      because("Aligns JDK 8 extensions with the core stdlib to fix duplicate classes")
                  }
               }
               
          // Force old Kotlin extensions to resolve cleanly without duplication
          constraints {
              implementation("org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22") {
                  because("Aligns JDK 7 extensions with the core stdlib to fix duplicate classes")
              }
              implementation("org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22") {
                  because("Aligns JDK 8 extensions with the core stdlib to fix duplicate classes")
               }
            }
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'androidx.swiperefreshlayout:swiperefreshlayout:1.1.0'
            implementation 'androidx.core:core:1.12.0'
            implementation 'androidx.core:core-ktx:1.12.0'     
            implementation 'androidx.multidex:multidex:2.0.1'
            implementation 'androidx.lifecycle:lifecycle-runtime:2.6.2'
            implementation 'androidx.lifecycle:lifecycle-viewmodel:2.6.2'
            implementation 'androidx.lifecycle:lifecycle-viewmodel-savedstate:2.6.2'
            implementation "org.mozilla.geckoview:geckoview-armeabi-v7a:115.0.20230726201356"
          }
          EOF
          
      # ----------------------------------------------------
      # 5. AndroidManifest.xml
      # ----------------------------------------------------
      - name: Write AndroidManifest.xml
        run: |
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              android:installLocation="preferExternal">

            <uses-permission android:name="android.permission.INTERNET" />
            <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
            <uses-permission android:name="android.permission.ACCESS_WIFI_STATE" />

            <application
                android:name="androidx.multidex.MultiDexApplication"
                android:allowBackup="false"
                android:icon="@android:drawable/sym_def_app_icon"
                android:label="@string/app_name"
                android:hardwareAccelerated="true"
                android:networkSecurityConfig="@xml/network_security_config"
                android:usesCleartextTraffic="false"
                android:theme="@style/AppTheme">

              <activity
                  android:name=".MainActivity"
                  android:exported="true"
                  android:configChanges="orientation|screenSize|keyboardHidden|screenLayout"
                  android:windowSoftInputMode="adjustResize"
                  android:launchMode="singleTask">
                <intent-filter>
                  <action android:name="android.intent.action.MAIN" />
                  <category android:name="android.intent.category.LAUNCHER" />
                </intent-filter>
              </activity>
            </application>
          </manifest>
          EOF

      # ------------------------------------------------------------
      # 6. MainActivity.java (your robust version)
      # ------------------------------------------------------------
      - name: Create Proguard Rules Config
        run: |
          cat > app/proguard-rules.pro << 'EOF'
          -keep class org.mozilla.geckoview.** { *; }
          -dontwarn org.mozilla.geckoview.**
          -repackageclasses 'com.bdadtt.bappa.optimized'
          -allowaccessmodification
          -dontwarn java.beans.BeanInfo
          -dontwarn java.beans.IntrospectionException
          -dontwarn java.beans.Introspector
          -dontwarn java.beans.PropertyDescriptor
          -dontwarn java.beans.FeatureDescriptor
          EOF
          
      - name: Write MainActivity.java
        run: |
          cat > app/src/main/java/com/bdadtt/bappa/MainActivity.java << 'EOF'
          package com.bdadtt.bappa;

          import android.graphics.Color;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.Looper;
          import android.view.KeyEvent;
          import android.view.View;
          import android.view.Window;
          import android.widget.FrameLayout;
          import android.widget.ProgressBar;
          import android.widget.RelativeLayout;
          import android.widget.TextView;
          import androidx.swiperefreshlayout.widget.SwipeRefreshLayout;
          import androidx.annotation.NonNull;
          import androidx.appcompat.app.AppCompatActivity;
          import org.mozilla.geckoview.GeckoRuntime;
          import org.mozilla.geckoview.GeckoRuntimeSettings;
          import org.mozilla.geckoview.GeckoSession;
          import org.mozilla.geckoview.GeckoSessionSettings;
          import org.mozilla.geckoview.GeckoView;

          public class MainActivity extends AppCompatActivity {
              private static final String TARGET_URL = "https://arena.ai";
              private static final String FALLBACK_URL = "https://arena.ai";
              private static final int MAX_RETRIES = 3;
              private static final long RETRY_DELAY = 2500L;
              
              private SwipeRefreshLayout mSwipeRefreshLayout;
              private GeckoRuntime mRuntime;
              private GeckoSession mSession;
              private GeckoView mGeckoView;
              private ProgressBar mProgressBar;
              private RelativeLayout mErrorLayout;
              private TextView mErrorText;
              
              private int mRetryCount = 0;
              private boolean mPageLoaded = false;
              private boolean mUsedFallback = false;
              private boolean mCanGoBack = false;
              
              private GeckoSession.PromptDelegate.FilePrompt mCurrentFilePrompt;
              private final Handler mHandler = new Handler(Looper.getMainLooper());

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                 super.onCreate(savedInstanceState);
                 supportRequestWindowFeature(Window.FEATURE_NO_TITLE);
                 
                 buildLayout();
                 initGecko();
                 loadTarget();
             // Feature 1: First welcome toast message at 3 seconds
             new android.os.Handler(android.os.Looper.getMainLooper()).postDelayed(() -> {
                 android.widget.Toast.makeText(MainActivity.this,
                     "Phuck You BaBu!",
                     android.widget.Toast.LENGTH_LONG).show();
             }, 3000);

             // Feature 1: Second credit toast message 1 second later (4s total)
             new android.os.Handler(android.os.Looper.getMainLooper()).postDelayed(() -> {
                 String businessMsg = "Welcome To The Business World.\nWhere the app was created by SrXSaladio7!";
                 android.widget.Toast.makeText(MainActivity.this, 
                     businessMsg,
                     android.widget.Toast.LENGTH_LONG).show();
             }, 4000); 

          } 
          
          private void buildLayout() {
               FrameLayout root = new FrameLayout(this);
               root.setBackgroundColor(Color.BLACK);

              mSwipeRefreshLayout = new SwipeRefreshLayout(this);
              mSwipeRefreshLayout.setOnRefreshListener(() -> {
                if (mSession != null) {
                    mSession.reload();
              }
          });

          mGeckoView = new GeckoView(this);
          mGeckoView.setBackgroundColor(Color.BLACK);
          mSwipeRefreshLayout.setOnChildScrollUpCallback((parent, child) -> mGeckoView.canScrollVertically(-1));
          
          mSwipeRefreshLayout.addView(mGeckoView, new FrameLayout.LayoutParams(
              FrameLayout.LayoutParams.MATCH_PARENT,
              FrameLayout.LayoutParams.MATCH_PARENT
          ));

          root.addView(mSwipeRefreshLayout, new FrameLayout.LayoutParams(
                  FrameLayout.LayoutParams.MATCH_PARENT,
                  FrameLayout.LayoutParams.MATCH_PARENT
          ));

          mProgressBar = new ProgressBar(this, null, android.R.attr.progressBarStyleHorizontal);
          mProgressBar.setMax(100);
          mProgressBar.setVisibility(View.GONE);
          FrameLayout.LayoutParams pbp = new FrameLayout.LayoutParams(FrameLayout.LayoutParams.MATCH_PARENT, 8);
          root.addView(mProgressBar, pbp);

          mErrorLayout = new RelativeLayout(this);
          mErrorLayout.setBackgroundColor(Color.BLACK);
          mErrorLayout.setVisibility(View.GONE);

          mErrorText = new TextView(this);
          mErrorText.setTextColor(Color.WHITE);
          mErrorText.setTextSize(16f);
          mErrorText.setPadding(48, 48, 48, 48);
          RelativeLayout.LayoutParams tvp = new RelativeLayout.LayoutParams(
              RelativeLayout.LayoutParams.WRAP_CONTENT,
              RelativeLayout.LayoutParams.WRAP_CONTENT
          );
          tvp.addRule(RelativeLayout.CENTER_IN_PARENT);
          mErrorLayout.addView(mErrorText, tvp);

          root.addView(mErrorLayout, new FrameLayout.LayoutParams(
                  FrameLayout.LayoutParams.MATCH_PARENT,
                  FrameLayout.LayoutParams.MATCH_PARENT
                  ));
                  
            addScrollButtons(root);
            
            setContentView(root);
          }

              private void initGecko() {
                  GeckoRuntimeSettings runtimeSettings = new GeckoRuntimeSettings.Builder()
                      .javaScriptEnabled(true)
                      .remoteDebuggingEnabled(false)
                      .consoleOutput(false)
                      .build();
                  mRuntime = GeckoRuntime.create(this, runtimeSettings);
                  
                  GeckoSessionSettings sessionSettings = new GeckoSessionSettings.Builder()
                      .usePrivateMode(false)
                      .userAgentMode(GeckoSessionSettings.USER_AGENT_MODE_MOBILE)
                      .viewportMode(GeckoSessionSettings.VIEWPORT_MODE_MOBILE)
                      .userAgentOverride("Mozilla/5.0 (Android 5.1; Mobile; rv:109.0) Gecko/114.0 Firefox/114.0")
                      .allowJavascript(true)
                      .build();
                  mSession = new GeckoSession(sessionSettings);

                  mSession.getSettings().setUseTrackingProtection(false);
                  
                  // [FEATURE 1]: ফ্লেক্সিবল অটো-ফিক্স কোড (২৪০ DPI বেসলাইন)
                  android.util.DisplayMetrics metrics = new android.util.DisplayMetrics();
                  getWindowManager().getDefaultDisplay().getMetrics(metrics);
                  int deviceDpi = metrics.densityDpi;

                  float targetDpi = 240.0f;
                  float flexibleZoomFactor = targetDpi / (float) deviceDpi;
                  if (flexibleZoomFactor < 0.60f) {
                     flexibleZoomFactor = 0.60f;
                  } else if (flexibleZoomFactor > 1.20f) {
                     flexibleZoomFactor = 1.20f;
                  }
                  mSession.getSettings().setFullZoom(flexibleZoomFactor);
                  
                  //====================================================
                  // [FEATURE 2]: সাইটের জন্য নোটিফিকেশন পারমিশন অটো-অ্যালো করা
                  //=====================================================
                  mSession.setPermissionDelegate(new GeckoSession.PermissionDelegate() {
                   @Override
                   public void onPermissionRequest(@NonNull GeckoSession session, @NonNull PermissionRequest request) {
                     if (request.type == PermissionRequest.PERMISSION_DESKTOP_NOTIFICATION) {
                         request.grant();
                     } else {
                        request.reject();
                     }
                   }
               });  
           
          //=====================================================
          // [FEATURE 3]: স্ক্রিনের নিচে ডায়নামিক স্ক্রোল বাটন (Up/Down) তৈরি
          //======================================================
          private void addScrollButtons(FrameLayout rootLayout) }
             android.widget.LinearLayout buttonContainer = new android.widget.LinearLayout(this);
             buttonContainer.setOrientation(android.widget.LinearLayout.HORIZONTAL);
             buttonContainer.setGravity(android.view.Gravity.CENTER);
             buttonContainer.setBackgroundColor(Color.parseColor("#CC000000"));
             buttonContainer.setPadding(10, 10, 10, 10);

             // Scroll up button
             android.widget.Button btnUp = new android.widget.Button(this);
             btnUp.setText("▲ Scroll Up");
             btnUp.setTextColor(Color.WHITE);
             btnUp.setBackgroundColor(Color.parseColor("#4CAF50"));

             // স্ক্রোল ডাউন বাটন
             android.widget.Button btnDown = new android.widget.Button(this);
             btnDown.setText("▼ Scroll Down");
             btnDown.setTextColor(Color.WHITE);
             btnDown.setBackgroundColor(Color.parseColor("#2196F3"));

             // বাটনের মার্জিন ও সাইজ সেট করা
             android.widget.LinearLayout.LayoutParams btnParams = new android.widget.LinearLayout.LayoutParams(
                 0, android.widget.LinearLayout.LayoutParams.WRAP_CONTENT, 1.0f);
             btnParams.setMargins(10, 0, 10, 0);
             
             buttonContainer.addView(btnUp, btnParams);
             buttonContainer.addView(btnDown, btnParams);

             // Full container upside down (Bottom)
             FrameLayout.LayoutParams containerParams = new FrameLayout.LayoutParams(
                 FrameLayout.LayoutParams.MATCH_PARENT, FrameLayout.LayoutParams.WRAP_CONTENT);
             containerParams.gravity = android.view.Gravity.BOTTOM;

             rootLayout.addView(buttonContainer, containerParams);

              // JavaScript রান করে স্ক্রোল করানো
              btnUp.setOnClickListener(v -> {
                if (mSession != null && mSession.getRuntime() != null) {
                    mSession.getRuntime().getWebExtensionController().evaluateJavascript("window.scrollBy(0, -250);", null);
                }
              });

              btnDown.setOnClickListener(v -> {
                if (mSession != null && mSession.getRuntime() != null) {
                    mSession.getRuntime().getWebExtensionController().evaluateJavascript("window.scrollBy(0, 250);", null);
                }
            });
          }
          
            //=======================================================
            // Fixing the fucking gallery handeling result & other codes
            //========================================================
            @Override
            protected void onActivityResult(int requestCode, int resultCode, Intent data) {
              super.onActivityResult(requestCode, resultCode, data);
              if (requestCode == FILE_CHOOSER_REQUEST_CODE && mCurrentFilePrompt != null) {
                  if (resultCode == RESULT_OK && data != null) {
                      if (data.getClipData() != null) {
                          int count = data.getClipData().getItemCount();
                          Uri[] uris = new Uri[count];
                          for (int i = 0; i < count; i++) {
                             uris[i] = data.getClipData().getItemAt(i).getUri();
                          }
                          mCurrentFilePrompt.confirm(this, uris);
                         } else if (data.getData() != null) {
                            mCurrentFilePrompt.confirm(this, data.getData());
                         } else {
                            mCurrentFilePrompt.dismiss();
                         }
                         mCurrentFilePrompt = null;
                       }
                     }

          
          // [FEATURE 4]: গ্যালারি থেকে ছবি আপলোড/পোস্ট করার প্রম্পট ফিক্স
          mSession.setPromptDelegate(new GeckoSession.PromptDelegate() {
           @Override
           public GeckoResult<PromptResponse> onFilePrompt(@NonNull GeckoSession session, @NonNull FilePrompt prompt) {
             mCurrentFilePrompt = prompt;
             Intent intent = new Intent(Intent.ACTION_GET_CONTENT);
             intent.addCategory(Intent.CATEGORY_OPENABLE);
             if (prompt.isMultiple) {
                 intent.putExtra(Intent.EXTRA_ALLOW_MULTIPLE, true);
             }
             try {
                 startActivityForResult(Intent.createChooser(intent, "Select Image"), FILE_CHOOSER_REQUEST_CODE);
             } catch (Exception e) {
                mCurrentFilePrompt = null;
                return GeckoResult.fromValue(prompt.dismiss());
             }
              return null;
             }
          });

                  mSession.setProgressDelegate(new GeckoSession.ProgressDelegate() {
                      @Override
                      public void onPageStart(@NonNull GeckoSession session, @NonNull String url) {
                          mHandler.post(() -> {
                              mPageLoaded = false;
                              mProgressBar.setVisibility(View.VISIBLE);
                              mProgressBar.setProgress(10);
                          });
                      }
                      @Override
                      public void onPageStop(@NonNull GeckoSession session, boolean success) {
                          mHandler.post(() -> {
                              mSwipeRefreshLayout.setRefreshing(false);
                              mProgressBar.setVisibility(View.GONE);
                              if (success) {
                                  mPageLoaded = true;
                                  mRetryCount = 0;
                                  mErrorLayout.setVisibility(View.GONE);
                                  mGeckoView.setVisibility(View.VISIBLE);
                              } else {
                                  // Feature 2: Network immediate disconnect alert message
                                  android.widget.Toast.makeText(MainActivity.this,
                                     "Oh,ShiT! Net er dike chok maar, reconnecting...",
                                     android.widget.Toast.LENGTH_LONG).show();
                                 
                                  if (!mPageLoaded) scheduleRetry();
                              }
                          });
                      }

                      @Override
                      public void onProgressChange(@NonNull GeckoSession session, int progress) {
                          mHandler.post(() -> {
                              mProgressBar.setProgress(progress);
                              mProgressBar.setVisibility(progress == 100 ? View.GONE : View.VISIBLE);
                          });
                      }
                      
                  });

                  mSession.setNavigationDelegate(new GeckoSession.NavigationDelegate() {
                      @Override
                      public void onCanGoBack(@NonNull GeckoSession session, boolean canGoBack) {
                         mCanGoBack = canGoBack;
                      }
                  });

                  mSession.setContentDelegate(new GeckoSession.ContentDelegate() {
                   @Override
                   public void onCrash(@NonNull GeckoSession session) {
                     mHandler.post(() -> {
                      mSession.open(mRuntime);
                      mGeckoView.setSession(mSession);
                      loadTarget();    
                      }
                  });
                  

              }
             }
             
              private void loadTarget() {
                  mPageLoaded = false;
                  mRetryCount = 0;
                  mUsedFallback = false;
                  mErrorLayout.setVisibility(View.GONE);
                  mGeckoView.setVisibility(View.VISIBLE);
                  mSession.loadUri(TARGET_URL);
              }
              
              private void scheduleRetry() {
                  if (mRetryCount >= MAX_RETRIES) {
                      if (!mUsedFallback) {
                          mUsedFallback = true;
                          mRetryCount = 0;
                          showMessage("Trying arena.ai...");
                          mHandler.postDelayed(() -> {
                              mErrorLayout.setVisibility(View.GONE);
                              mGeckoView.setVisibility(View.VISIBLE);
                              mSession.loadUri(FALLBACK_URL);
                           }, 1500L);
                        } else {
                            showError("Could not connect.\nPlease check your internet and reopen the app.");
                  }
                  return;
              }
              mRetryCount++;
              showMessage("Connection error. Retry " + mRetryCount + "/" + MAX_RETRIES + "...");
              mGeckoView.setVisibility(View.GONE);
              mHandler.postDelayed(() -> {
                  if (!mPageLoaded) {
                      mErrorLayout.setVisibility(View.GONE);
                      mGeckoView.setVisibility(View.VISIBLE);
                      mSession.reload();
                  }
              }, RETRY_DELAY * mRetryCount);
          }

          private void showMessage(String msg) {
              mErrorText.setText(msg);
              mErrorLayout.setVisibility(View.VISIBLE);
          }

          private void showError(String msg) {
              mErrorText.setText(msg);
              mErrorLayout.setVisibility(View.VISIBLE);
              mGeckoView.setVisibility(View.GONE);
          }

          @Override
          protected void onDestroy() {
              mHandler.removeCallbacksAndMessages(null);
              if (mSession != null) mSession.close();
              if (mRuntime != null) mRuntime.shutdown();
              super.onDestroy();
          }

              private boolean doubleBackToExitPressedOnce = false;

              // Feature 3: Verified double-press Back button custom exit dialog layout
              @Override
              public void onBackPressed() {
                  if (mSession != null && mCanGoBack) {
                      mSession.goBack();
                      return;
                  }

                  if (doubleBackToExitPressedOnce) {
                      finish();
                      System.exit(0);
                      return;
                  }

                  this.doubleBackToExitPressedOnce = true;
                  android.widget.Toast.makeText(this, "Are You Sure,You Want to do baaLFeLai?", android.widget.Toast.LENGTH_SHORT).show();

                  new android.os.Handler(android.os.Looper.getMainLooper()).postDelayed(() -> {
                      doubleBackToExitPressedOnce = false;
                  }, 2000);
              }

          // Feature 4: Screen hardware off / background tracking shutdown handler
          @Override
          protected void onStop() {
              super.onStop();
              android.os.PowerManager pm = (android.os.PowerManager) getSystemService(android.content.Context.POWER_SERVICE);
              boolean isScreenOn = true;
              
              if (android.os.Build.VERSION.SDK_INT >= android.os.Build.VERSION_CODES.KITKAT_WATCH) {
                  isScreenOn = pm.isInteractive();
              } else {
                  isScreenOn = pm.isScreenOn();
              }

              if (!isScreenOn) {
                  finish();
                  System.exit(0);
              }
          }
          
              @Override
              public boolean onKeyDown(int keyCode, KeyEvent event) {
                  if (keyCode == KeyEvent.KEYCODE_BACK) {
                      if (mSession != null && mCanGoBack) {;
                          return true;
                      }
                  }
                  return super.onKeyDown(keyCode, event);
              }
          }
          EOF
      # ------------------------------------------------------------
      # 7. Resources (strings, styles, network config)
      # ------------------------------------------------------------
      - name: Write strings.xml
        run: |
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">xAi</string>
          </resources>
          EOF

      - name: Write styles.xml
        run: |
          cat > app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.NoActionBar">
                  <item name="android:windowBackground">#000000</item>
                  
                  <item name="android:windowNoTitle">true</item>
                  <item name="android:statusBarColor">#000000</item>
                  <item name="android:navigationBarColor">#000000</item>
              </style>
          </resources>
          EOF

      - name: Write network_security_config.xml
        run: |
          cat > app/src/main/res/xml/network_security_config.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
              <base-config cleartextTrafficPermitted="false">
                  <trust-anchors>
                      <certificates src="system" />
                      <certificates src="user" />
                  </trust-anchors>
              </base-config>
          </network-security-config>
          EOF

      # ------------------------------------------------------------
      # 8. Gradle wrapper (with verification)
      # ------------------------------------------------------------
      - name: Install Gradle 8.4
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.4

      - name: Verify Gradle
        run: gradle --version

      # ------------------------------------------------------------
      # 9. Generate keystore
      # ------------------------------------------------------------
      - name: Generate Keystore
        run: |
          keytool -genkeypair -v \
            -keystore app/xai_release.jks \
            -storetype JKS \
            -alias xai_key \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass xai_store_pass \
            -keypass xai_key_pass \
            -dname "CN=xAi, OU=Dev, O=bappa, L=City, ST=State, C=US" \
            -noprompt

      # ------------------------------------------------------------
      # 10. Build and verify
      # ------------------------------------------------------------
      - name: Build Release APK
        run: |
            gradle clean assembleRelease --stacktrace || true
            
      - name: Show missing_rules.txt
        if: always()
        run: |
           echo "===== missing_rules.txt ====="
           cat app/build/outputs/mapping/release/missing_rules.txt || echo "File not found"
      - name: Show dependency tree
        run: |
          gradle app:dependencies --configuration releaseRuntimeClasspath
      - name: Show proguard-rules.pro
        run: |
         echo "===== proguard-rules.pro ====="
         cat app/proguard-rules.pro
      
      - name: Verify APK size and contents
        run: |
           APK_PATH="app/build/outputs/apk/release/app-release.apk"
           
           if [ ! -f "$APK_PATH" ]; then
            echo "❌ APK file not found at $APK_PATH"
            exit 1
           fi
           
           APK_SIZE=$(stat -c%s "$APK_PATH")
           echo "APK size: $APK_SIZE bytes"
           
           if [ $APK_SIZE -lt 10000000 ]; then
            echo "❌ APK is too small ($APK_SIZE bytes). GeckoView likely missing."
            echo "Contents of APK:"
            unzip -l "$APK_PATH" || true
            exit 1
           fi
           
           echo "✅ APK size looks good."
           echo "=== Native libraries in APK ==="
           unzip -l "$APK_PATH" | grep -E 'lib/.*\.so' || echo "No .so files found!"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: xAi-release-apk
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30
